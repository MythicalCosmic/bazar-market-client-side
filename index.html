<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bazar Market</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      /* ══════════════════════════════════════════
         Design System: "Verdant Luxe"
         Warm organic tones + rich emerald accents
         ══════════════════════════════════════════ */

      :root {
        --bg-app: #F5FAF7;
        --surface: #FFFFFF;
        --surface-secondary: #EFF5F1;
        --surface-tertiary: #E0EBE4;
        --text-primary: #14261A;
        --text-secondary: #4B6B55;
        --text-tertiary: #8CA698;
        --border: rgba(5, 80, 50, 0.06);
        --shadow: rgba(20, 80, 50, 0.06);
        --shadow-lg: rgba(20, 80, 50, 0.10);
        --primary: #059669;
        --primary-dark: #047857;
        --primary-light: #D1FAE5;
        --primary-glow: rgba(5, 150, 105, 0.25);
        --accent: #F97316;
        --accent-light: #FFEDD5;
        --img-bg: #F0F7F2;
      }

      .dark {
        --bg-app: #0A0F0C;
        --surface: #141E18;
        --surface-secondary: #1C2B22;
        --surface-tertiary: #2A3D30;
        --text-primary: #F0FAF4;
        --text-secondary: #8CB89A;
        --text-tertiary: #5A7D66;
        --border: rgba(16, 185, 129, 0.08);
        --shadow: rgba(0, 0, 0, 0.4);
        --shadow-lg: rgba(0, 0, 0, 0.55);
        --primary-light: #064E3B;
        --primary-glow: rgba(16, 185, 129, 0.2);
        --accent-light: #431407;
        --img-bg: #F8F8F8;
      }

      /* ── Reset ── */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg-app);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      #app {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: var(--bg-app);
        position: relative;
        overflow-x: hidden;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 0; height: 0; }
      .scroll-x { overflow-x: auto; scrollbar-width: none; }
      .scroll-x::-webkit-scrollbar { display: none; }

      /* ── Route Transitions ── */
      .fade-enter-active, .fade-leave-active { transition: opacity 0.25s ease; }
      .fade-enter-from, .fade-leave-to { opacity: 0; }

      .slide-left-enter-active, .slide-left-leave-active { transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1); }
      .slide-left-enter-from { opacity: 0; transform: translateX(40px); }
      .slide-left-leave-to { opacity: 0; transform: translateX(-20px); }

      .slide-right-enter-active, .slide-right-leave-active { transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1); }
      .slide-right-enter-from { opacity: 0; transform: translateX(-40px); }
      .slide-right-leave-to { opacity: 0; transform: translateX(20px); }

      .slide-up-enter-active { transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1); }
      .slide-up-leave-active { transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1); }
      .slide-up-enter-from { opacity: 0; transform: translateY(40px); }
      .slide-up-leave-to { opacity: 0; transform: translateY(40px); }

      .list-enter-active { transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1); }
      .list-leave-active { transition: all 0.2s ease; }
      .list-enter-from { opacity: 0; transform: translateY(12px); }
      .list-leave-to { opacity: 0; transform: scale(0.96); opacity: 0; }

      /* ── Micro Interactions ── */
      .btn-press {
        transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.15s ease;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .btn-press:active { transform: scale(0.96); }

      .product-card {
        transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        -webkit-tap-highlight-color: transparent;
      }
      .product-card:active { transform: scale(0.98); }

      /* ── Banner ── */
      .banner-bg { background: linear-gradient(135deg, #059669 0%, #047857 50%, #065F46 100%); }

      /* ── Badges ── */
      .badge-new { background: linear-gradient(135deg, #10B981, #059669); }
      .badge-hot { background: linear-gradient(135deg, #F97316, #EA580C); }

      /* ── Cart FAB ── */
      @keyframes pop {
        0%   { transform: scale(0.4); opacity: 0; }
        60%  { transform: scale(1.08); }
        85%  { transform: scale(0.97); }
        100% { transform: scale(1); opacity: 1; }
      }
      .pop { animation: pop 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

      @keyframes pulse-ring {
        0%   { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4); }
        70%  { box-shadow: 0 0 0 12px rgba(5, 150, 105, 0); }
        100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }
      }
      .pulse-ring { animation: pulse-ring 1.5s ease-out 1; }

      /* ── Radio ── */
      .radio-outer {
        width: 22px; height: 22px; border-radius: 50%;
        border: 2px solid var(--surface-tertiary);
        display: flex; align-items: center; justify-content: center;
        transition: border-color 0.2s ease;
      }
      .radio-outer.active { border-color: var(--primary); }
      .radio-inner { width: 12px; height: 12px; border-radius: 50%; background: var(--primary); }

      /* ── Splash Animations ── */
      @keyframes splash-logo-in {
        0%   { transform: scale(0); opacity: 0; }
        50%  { transform: scale(1.06); opacity: 1; }
        75%  { transform: scale(0.97); }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes splash-text-in {
        0%   { transform: translateY(24px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes splash-text-left {
        0%   { transform: translateX(-60px); opacity: 0; }
        60%  { transform: translateX(6px); opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes splash-text-right {
        0%   { transform: translateX(60px); opacity: 0; }
        60%  { transform: translateX(-6px); opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes splash-shimmer {
        0%   { transform: translateX(-100%) rotate(25deg); }
        100% { transform: translateX(200%) rotate(25deg); }
      }
      @keyframes splash-ripple {
        0%   { transform: scale(0); opacity: 0.25; }
        100% { transform: scale(4); opacity: 0; }
      }
      @keyframes splash-fadeout {
        0%   { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes splash-glow {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50%      { opacity: 0.7; transform: scale(1.15); }
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(-10px); }
      }

      /* ── Shimmer / Skeleton ── */
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, var(--surface-secondary) 25%, var(--surface-tertiary) 50%, var(--surface-secondary) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.8s infinite ease-in-out;
        border-radius: 14px;
      }

      /* ── Fade up for scroll reveals ── */
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fade-up 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }

      /* ── Glass Effect Utility ── */
      .glass-surface {
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
      }
      .dark .glass-surface {
        background: rgba(12, 10, 9, 0.82);
      }

      /* ── Safe area helpers ── */
      .safe-top { padding-top: env(safe-area-inset-top, 0px); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
