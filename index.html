<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bazar Market</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      /* ── Theme Variables ── */
      :root {
        --bg-app: #f5f7f5;
        --surface: #ffffff;
        --surface-secondary: #f3f4f6;
        --surface-tertiary: #e5e7eb;
        --text-primary: #111827;
        --text-secondary: #6b7280;
        --text-tertiary: #9ca3af;
        --border: #f0f0f0;
        --shadow: rgba(0,0,0,0.07);
        --shadow-lg: rgba(0,0,0,0.12);
        --primary: #2DB84B;
        --primary-dark: #229e3f;
        --primary-light: #eaf8ee;
        --primary-glow: rgba(45,184,75,0.4);
        --img-bg: #f8f8f8;
      }
      .dark {
        --bg-app: #0f0f0f;
        --surface: #1a1a1a;
        --surface-secondary: #252525;
        --surface-tertiary: #333333;
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --text-tertiary: #6b7280;
        --border: #2a2a2a;
        --shadow: rgba(0,0,0,0.3);
        --shadow-lg: rgba(0,0,0,0.5);
        --primary-light: #1a3322;
        --primary-glow: rgba(45,184,75,0.25);
        --img-bg: #f8f8f8;
      }

      /* ── Reset ── */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Nunito', sans-serif;
        background: var(--bg-app);
        min-height: 100vh;
        overflow-x: hidden;
      }
      #app {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: var(--bg-app);
        position: relative;
        overflow-x: hidden;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 0; height: 0; }
      .scroll-x { overflow-x: auto; scrollbar-width: none; }
      .scroll-x::-webkit-scrollbar { display: none; }

      /* ── Route Transitions ── */
      .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
      .fade-enter-from, .fade-leave-to { opacity: 0; }

      .slide-left-enter-active, .slide-left-leave-active { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
      .slide-left-enter-from { opacity: 0; transform: translateX(30px); }
      .slide-left-leave-to { opacity: 0; transform: translateX(-30px); }

      .slide-right-enter-active, .slide-right-leave-active { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
      .slide-right-enter-from { opacity: 0; transform: translateX(-30px); }
      .slide-right-leave-to { opacity: 0; transform: translateX(30px); }

      .slide-up-enter-active { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
      .slide-up-leave-active { transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
      .slide-up-enter-from { opacity: 0; transform: translateY(40px); }
      .slide-up-leave-to { opacity: 0; transform: translateY(40px); }

      .list-enter-active { transition: all 0.3s ease; }
      .list-leave-active { transition: all 0.2s ease; }
      .list-enter-from { opacity: 0; transform: translateX(-16px); }
      .list-leave-to { opacity: 0; transform: translateX(16px); }

      /* ── Micro Interactions ── */
      .btn-press { transition: transform 0.12s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
      .btn-press:active { transform: scale(0.92); }
      .product-card { transition: transform 0.14s; -webkit-tap-highlight-color: transparent; }
      .product-card:active { transform: scale(0.97); }

      /* ── Banner ── */
      .banner-bg { background: linear-gradient(135deg, #2DB84B 0%, #1aac40 55%, #0d8c30 100%); }

      /* ── Badges ── */
      .badge-new { background: linear-gradient(135deg, #2DB84B, #1a9e38); }
      .badge-hot { background: linear-gradient(135deg, #ff6b35, #e84545); }

      /* ── Cart FAB ── */
      @keyframes pop {
        0%   { transform: scale(0.4); opacity: 0; }
        70%  { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }
      .pop { animation: pop 0.3s cubic-bezier(0.36,0.07,0.19,0.97); }

      @keyframes pulse-ring {
        0%   { box-shadow: 0 0 0 0 rgba(45,184,75,0.5); }
        70%  { box-shadow: 0 0 0 10px rgba(45,184,75,0); }
        100% { box-shadow: 0 0 0 0 rgba(45,184,75,0); }
      }
      .pulse-ring { animation: pulse-ring 1.5s ease-out 1; }

      /* ── Radio ── */
      .radio-outer {
        width: 20px; height: 20px; border-radius: 50%;
        border: 2px solid var(--surface-tertiary);
        display: flex; align-items: center; justify-content: center;
        transition: border-color 0.15s;
      }
      .radio-outer.active { border-color: var(--primary); }
      .radio-inner { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }

      /* ── Splash Animations ── */
      @keyframes splash-logo-in {
        0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
        60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
        80%  { transform: scale(0.95) rotate(-1deg); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes splash-text-left {
        0%   { transform: translateX(-60px); opacity: 0; }
        60%  { transform: translateX(6px); opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes splash-text-right {
        0%   { transform: translateX(60px); opacity: 0; }
        60%  { transform: translateX(-6px); opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes splash-shimmer {
        0%   { transform: translateX(-100%) rotate(25deg); }
        100% { transform: translateX(200%) rotate(25deg); }
      }
      @keyframes splash-ripple {
        0%   { transform: scale(0); opacity: 0.3; }
        100% { transform: scale(3); opacity: 0; }
      }
      @keyframes splash-fadeout {
        0%   { opacity: 1; }
        100% { opacity: 0; }
      }

      /* ── Shimmer / Skeleton ── */
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, var(--surface-secondary) 25%, var(--surface-tertiary) 50%, var(--surface-secondary) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }

      /* ── Fade up for scroll reveals ── */
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fade-up 0.4s ease-out both; }

      /* ── Safe area helpers ── */
      .safe-top { padding-top: env(safe-area-inset-top, 0px); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
